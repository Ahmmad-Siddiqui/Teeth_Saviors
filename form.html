<!DOCTYPE html>
<html>
<head>
	<!--linking html to external css - 'style.css'-->

	<link rel="stylesheet" href="style.css">


	<title>form</title>
</head>
<body>
	<center>
    <h1>Registration Form</h1>

    <form class = "regform" action="Page1.html">

    	<label>Full Name</label><br>
    	<input type="text" name="fname" required><br><br>

    	<label>Gender</label><br>
    	<select>
    		<option>Male</option>
    		<option>Female</option>
    		<option>Prefer not to say</option>
    		<option>Dinasour</option>
    	</select><br><br>

    	<label>Date of Birth</label><br>
    	<input type="date" name="fDOB"><br><br>

    	<label>Phone Number</label><br>
    	<input type="number" name="fnumber"><br><br>

    	<label>Email</label><br>
    	<input type="email" name="femail"><br><br>

    	<label>Address</label><br>
    	<input type="text" name="faddress"><br><br>

    	<label>Passport Copy</label><br>
    	<input type="file" name="fpassport"><br><br>

    	<input class="button" type="submit" name="fnoname"><br>

    </form>


    </center>
</body>
</html>
